databaseChangeLog:
  - changeSet:
      id: create-movie_actors-table
      author: wersebu
      changes:
        - createTable:
            tableName: movies_actors
            columns:
              - column:
                  name: movie_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_movies_actors_movie
                    referencedTableName: movies
                    referencedColumnNames: id
                    primaryKey: true
              - column:
                  name: actor_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_movies_actors_actor
                    referencedTableName: actors
                    referencedColumnNames: id
                    nullable: false
                    primaryKey: true